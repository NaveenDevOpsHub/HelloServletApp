name: Build & Deploy to Tomcat (Windows Self-Hosted)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: [self-hosted, windows]

    env:
      JAVA_HOME: 'C:\Program Files\Java\jdk-25.0.3'
      MAVEN_HOME: 'C:\Users\testnaveen\Tomcat\apache-maven-3.9.16'
      TOMCAT_HOME: 'C:\Users\testnaveen\Tomcat\apache-tomcat-11.0.23'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set PATH (Java + Maven)
        shell: powershell
        run: |
          echo "Updating PATH..."
          $env:PATH = "$env:JAVA_HOME\bin;$env:MAVEN_HOME\bin;$env:PATH"
          echo "JAVA_HOME=$env:JAVA_HOME"
          echo "MAVEN_HOME=$env:MAVEN_HOME"

      - name: Build Maven Project
        shell: powershell
        working-directory: ${{ github.workspace }}
        run: |
          & "$env:MAVEN_HOME\bin\mvn.cmd" clean package -DskipTests

      - name: Stop Tomcat Server
        shell: powershell
        run: |
          Write-Host "Stopping Tomcat..."
          & "$env:TOMCAT_HOME\bin\shutdown.bat"
          Start-Sleep -Seconds 10

      - name: Deploy WAR to Tomcat
        shell: powershell
        run: |
          Write-Host "Deploying WAR file..."

          $warSource = Get-ChildItem -Path "${{ github.workspace }}\target" -Filter "*.war" | Select-Object -First 1

          if ($warSource -eq $null) {
            throw "WAR file not found in target folder!"
          }

          Copy-Item $warSource.FullName -Destination "$env:TOMCAT_HOME\webapps\" -Force

      - name: Start Tomcat Server
        shell: powershell
        run: |
          Write-Host "Starting Tomcat..."
          & "$env:TOMCAT_HOME\bin\startup.bat"

      - name: Deployment Success
        run: echo "Application deployed successfully!"