name: Build and Deploy Java WAR to Tomcat

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Verify Java Version
        run: java -version

      - name: Verify Maven Version
        run: mvn -version

      - name: Build WAR
        run: mvn clean package

      - name: Stop Tomcat
        shell: powershell
        run: |
          cd "C:\Users\testnaveen\Tomcat\apache-tomcat-11.0.23\bin"
          .\shutdown.bat

      - name: Deploy WAR to Tomcat
        shell: powershell
        run: |
          Remove-Item "C:\Users\testnaveen\Tomcat\apache-tomcat-11.0.23\webapps\HelloServletApp-1.0.war" -Force -ErrorAction SilentlyContinue
          Remove-Item "C:\Users\testnaveen\Tomcat\apache-tomcat-11.0.23\webapps\HelloServletApp-1.0" -Recurse -Force -ErrorAction SilentlyContinue
          Copy-Item "C:\Users\testnaveen\Tomcat\actions-runner\_work\HelloServletApp\HelloServletApp\target\HelloServletApp-1.0\target\HelloServletApp-1.0.war" "C:\Users\testnaveen\Tomcat\apache-tomcat-11.0.23\webapps\HelloServletApp-1.0.war"

      - name: Start Tomcat
        shell: powershell
        run: |
          cd "C:\Users\testnaveen\Tomcat\apache-tomcat-11.0.23\bin"
          .\startup.bat