name: Build and Deploy Java WAR to Tomcat

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Build WAR using Maven
        run: mvn clean package

      - name: Stop Tomcat
        shell: powershell
        run: |
          cd "C:\Users\testnaveen\Tomcat\apache-tomcat-11.0.23\bin"
          .\shutdown.bat

      - name: Deploy WAR to Tomcat
        shell: powershell
        run: |
          Remove-Item "C:\Users\testnaveen\Tomcat\apache-tomcat-11.0.23\webapps\HelloServletApp-1.0.war" -Force -ErrorAction SilentlyContinue
          Remove-Item "C:\Users\testnaveen\Tomcat\apache-tomcat-11.0.23\webapps\HelloServletApp-1.0" -Recurse -Force -ErrorAction SilentlyContinue
          Copy-Item "C:\Users\testnaveen\OneDrive\Desktop\HelloServletApp\target\HelloServletApp-1.0.war" "C:\Users\testnaveen\Tomcat\apache-tomcat-11.0.23\webapps\HelloServletApp-1.0.war"

      - name: Start Tomcat
        shell: powershell
        run: |
          cd "C:\Users\testnaveen\Tomcat\apache-tomcat-11.0.23\bin"
          .\startup.bat